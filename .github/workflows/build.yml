name: build

on:
  push:
    branches: [master]
    paths:
      - 'tools/tiaportal-mcp/src/TiaMcpServer/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'tools/tiaportal-mcp/src/TiaMcpServer/**'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: V21
            project: TiaMcpServer.csproj
          - name: V20
            project: TiaMcpServer.V20.csproj
    name: build ${{ matrix.name }}
    defaults:
      run:
        working-directory: tools/tiaportal-mcp/src/TiaMcpServer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      # Fresh checkout per matrix leg => no obj/obj-v20 collision between the two targets.
      - name: Restore
        run: dotnet restore ${{ matrix.project }}
      - name: Build (Release)
        run: dotnet build ${{ matrix.project }} -c Release --no-restore
